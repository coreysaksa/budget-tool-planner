# Builds the planner image, pushes it to Azure Container Registry, and rolls the
# Container App to the new image — using GitHub OIDC (no stored credentials).
#
# Requires the same repo secrets/variables as budget-infra:
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Variables: AZURE_RESOURCE_GROUP  (e.g. AI-BudgetingTool)
#              ACR_NAME              (e.g. acrbudgetai<suffix>, from infra outputs)
#              CONTAINER_APP_NAME    (e.g. budgetai-planner)
#
# The budget-infra deployment must have created the ACR and Container App first.
name: Deploy (Planner)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push image (ACR Tasks)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr build \
              --registry "${{ vars.ACR_NAME }}" \
              --image "planner:${{ github.sha }}" \
              --image "planner:latest" \
              .

      - name: Roll Container App to new image
        uses: azure/cli@v2
        with:
          inlineScript: |
            loginServer=$(az acr show --name "${{ vars.ACR_NAME }}" \
              --query loginServer -o tsv)
            az containerapp update \
              -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
              -n "${{ vars.CONTAINER_APP_NAME }}" \
              --image "${loginServer}/planner:${{ github.sha }}"

            fqdn=$(az containerapp show \
              -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
              -n "${{ vars.CONTAINER_APP_NAME }}" \
              --query properties.configuration.ingress.fqdn -o tsv)
            {
              echo "## Planner deployed"
              echo ""
              echo "Image: \`${loginServer}/planner:${{ github.sha }}\`"
              echo "URL: \`https://${fqdn}\`"
            } >> "$GITHUB_STEP_SUMMARY"
